name: link_formation
description: Bootstrap profile used for link formation after reset/disconnect.

dut:
  ip_mode: ipv6
  strict_ipv6: true
  local_ipv6: "2401:4900:d0:40d4:0:17b8:0:330"
  remote_ipv6s:
    - "2401:4900:d0:40d4::17b8:0:331"
  bts_pc_ipv6: "2401:4900:d0:40d4::17b8:0:301"
  cpe_pc_ipv6: "2401:4900:d0:40d4::17b8:0:302"
  mgmt_oob_ipv6: "2401:4900:d0:40d4::17b8:0:301"
  username: root
  password: Sen@0ubRNwk$

link:
  expected_mode: bootstrap
  target_bandwidth: HT80
  target_mcs_rate: MCS7
  target_spatial_stream: "2"
  target_ddrs_rate: MCS7
  health_check_timeout_s: 30

recovery:
  max_retries: 3
  retry_backoff_seconds:
    - 3
    - 8
    - 15
  allow_factory_reset: true
  factory_reset_command: firstboot && reboot
  reboot_wait_seconds: 150

traffic:
  benchmark_backend: ixia
  stats_backend: trex

capture:
  enabled: true
  username: root
  password: ""
  tool: tcpdump
  artifact_dir: logs/jumbo_captures
  remote_tmp_dir: /tmp/ubr_jumbo_captures
  bts_host: ""
  cpe_host: ""
  bts_interface: enp3s0
  cpe_interface: enp3s0
