[pytest]
# Enable native async support
asyncio_mode = auto

# Register custom Excel IDs
markers =
    Sanity: Core build verification tests
    CLI_01: SSH login validation
    GUI_01: API/GUI system summary validation
    CLI_190: Network ping validation from BSU to CPE
    JumboFrames: Jumbo frame MTU validation suite
    JMB_01: Jumbo case 01
    JMB_02: Jumbo case 02
    JMB_03: Jumbo case 03
    JMB_04: Jumbo case 04
    JMB_05: Jumbo case 05
    JMB_06: Jumbo case 06
    JMB_07: Jumbo case 07
    JMB_08: Jumbo case 08
    JMB_09: Jumbo case 09
    JMB_10: Jumbo case 10

# Mute third-party library warnings for a clean console
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore:.*CryptographyDeprecationWarning.*