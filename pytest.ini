[pytest]
# 1. Enable native async support so tests execute instead of skipping
asyncio_mode = auto

# 2. Tell the async engine that our connection fixtures last the whole session
asyncio_default_fixture_loop_scope = session

# 3. Register your custom Excel IDs to remove warnings and enable Jenkins filtering
markers =
    Sanity: Core build verification tests
    CLI_01: SSH login validation
    GUI_01: API/GUI system summary validation
    CLI_190: Network ping validation from BSU to CPE