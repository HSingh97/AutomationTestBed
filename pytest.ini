[pytest]
# Enable native async support
asyncio_mode = auto

# Register custom Excel IDs
markers =
    Sanity: Core build verification tests
    CLI_01: SSH login validation
    GUI_01: API/GUI system summary validation
    CLI_190: Network ping validation from BSU to CPE

# Mute third-party library warnings for a clean console
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore:.*CryptographyDeprecationWarning.*